{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">
    Chamada
</h1>

<div class="card shadow-sm">

    <div class="card-body">

        <h5 class="mb-4">

            {{ aula.modalidade }}
            -
            {{ aula.data }}

        </h5>

        <form method="post">

            {% csrf_token %}

            <div class="row">

                {% for aluno in alunos %}

                <div class="col-md-4 mb-3">

                    <div class="form-check">

                        <input class="form-check-input" type="checkbox" name="alunos" value="{{ aluno.id }}">

                        <label class="form-check-label">

                            {{ aluno.nome }}

                        </label>

                    </div>

                </div>

                {% endfor %}

            </div>

            <button type="submit" class="btn btn-dark mt-3">

                Salvar Presença

            </button>

        </form>

    </div>

</div>

{% endblock %}
