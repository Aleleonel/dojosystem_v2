{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow-sm">

                <div class="card-header">

                    <h4 class="mb-0">

                        Meu Perfil

                    </h4>

                </div>

                <div class="card-body">

                    <form method="POST" enctype="multipart/form-data">

                        {% csrf_token %}

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Nome
                                </label>

                                {{ form.first_name }}

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Sobrenome
                                </label>

                                {{ form.last_name }}

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Usuário
                            </label>

                            {{ form.username }}

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            {{ form.email }}

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Telefone
                            </label>

                            {{ form.telefone }}

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Foto
                            </label>

                            {{ form.foto }}

                        </div>

                        <div class="d-flex justify-content-end gap-2">

                            <a href="{% url 'dashboard' %}" class="btn btn-secondary">

                                Cancelar

                            </a>

                            <button type="submit" class="btn btn-dark">

                                Salvar Alterações

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
